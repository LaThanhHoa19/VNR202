version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hcm1975-postgres
    environment:
      POSTGRES_DB: hcm1975db
      POSTGRES_USER: hcm1975user
      POSTGRES_PASSWORD: hcm1975pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hcm1975user -d hcm1975db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hcm1975-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hcm1975db
      SPRING_DATASOURCE_USERNAME: hcm1975user
      SPRING_DATASOURCE_PASSWORD: hcm1975pass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_H2_CONSOLE_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  postgres_data:
